name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.1)'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Configure git identity (fixtures need one)
        run: |
          git config --global user.name "ci"
          git config --global user.email "ci@example.com"
          git config --global init.defaultBranch main
          git config --global commit.gpgsign false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Approve esbuild build script
        run: pnpm approve-builds esbuild || true

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
        env:
          ANTHROPIC_API_KEY: ""

      - name: Build
        run: pnpm build

      - name: Verify package.json version matches tag
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
